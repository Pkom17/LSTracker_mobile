# =====================================================================
# Build release demo + prod
# Déclencheurs :
#   - push d'un tag "v*"     → build APK demo + AAB prod (release signés)
#   - workflow_dispatch     → build manuel
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   - ANDROID_KEYSTORE_BASE64    : keystore .jks encodé en base64
#       Générer : base64 -i ~/path/to/lstracker.jks | pbcopy
#   - ANDROID_KEYSTORE_PASSWORD  : mot de passe du keystore
#   - ANDROID_KEY_ALIAS          : alias de la clé (ex: "lstracker")
#   - ANDROID_KEY_PASSWORD       : mot de passe de la clé (souvent = keystore pwd)
#
# Le keystore est reconstitué dans android/app/lstracker.jks à chaque run
# et key.properties est généré à la volée, jamais commit dans le repo.
# =====================================================================

name: Build & Release Mobile

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > android/app/lstracker.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=lstracker.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Install deps
        run: flutter pub get

      # ---------- DEMO : APK signé pour distribution hors Play Store ----------
      - name: Build APK demo (main_demo.dart)
        run: flutter build apk --release --target=lib/main_demo.dart

      - name: Rename demo APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/lstracker-demo-${{ github.ref_name }}.apk

      - name: Upload demo APK
        uses: actions/upload-artifact@v4
        with:
          name: lstracker-demo-apk
          path: build/app/outputs/flutter-apk/lstracker-demo-*.apk
          retention-days: 90

      # ---------- PROD : AAB pour upload Play Store ----------
      - name: Build AAB prod (main_prod.dart)
        run: flutter build appbundle --release --target=lib/main_prod.dart

      - name: Rename prod AAB
        run: |
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/lstracker-prod-${{ github.ref_name }}.aab

      - name: Upload prod AAB
        uses: actions/upload-artifact@v4
        with:
          name: lstracker-prod-aab
          path: build/app/outputs/bundle/release/lstracker-prod-*.aab
          retention-days: 90

      # ---------- GitHub Release (uniquement sur tag v*) ----------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/lstracker-demo-*.apk
            build/app/outputs/bundle/release/lstracker-prod-*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
