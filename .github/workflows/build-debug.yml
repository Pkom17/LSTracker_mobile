# =====================================================================
# Build APK debug (main.dart) — déclenché manuellement.
# Pour tests internes rapides. Pas signé en release.
# =====================================================================

name: Build APK debug

on:
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Build APK (debug, main.dart)
        run: flutter build apk --debug --target=lib/main.dart

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lstracker-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
